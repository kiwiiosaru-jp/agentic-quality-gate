# データ分類台帳 (Data Classification Register)
# ============================================================
# 目的:
#   全てのデータ資産について、機密度 4 区分 (公開/内部/機密/極秘) を
#   付与し、データ種別 × アクセス制御 × データオーナーを 1 件 1 行で
#   一元管理する。情報資産管理および権限設計の基礎データとなる。
#
# 対応する品質評価ID:
#   - LEGAL-DATACLASS-001 (High Fail) — データ分類台帳の独立文書なし
#
# 参照 pm-blueprint レイヤー:
#   - Layer 4: 非機能要件 (Security/Privacy)
#   - Layer 6: ガバナンス (情報資産管理)
#
# 4 分類定義:
#   public       (公開)   - 外部公開可。漏洩しても損害ゼロ
#   internal     (内部)   - 社内限定。漏洩で軽微な業務影響
#   confidential (機密)   - 業務上の機密。漏洩で重大な業務・契約影響
#   restricted   (極秘)   - 法令・契約上の最重要データ。漏洩で致命的影響
# ============================================================

metadata:
  document_name: "データ分類台帳"
  project_name: "[埋めてください]"
  version: "1.0"
  last_updated: "[YYYY-MM-DD]"
  document_owner: "情報セキュリティ管理者 (CISO/ISMS事務局)"
  next_review_due: "[YYYY-MM-DD 年1回]"
  related_documents:
    - "PII取扱台帳.yml"
    - "個情法対応マトリクス.yml"
    - "可観測性方針.md"

# ============================================================
# 凡例
# ============================================================
# classification: public / internal / confidential / restricted
# data_state: at_rest / in_transit / in_use
# access_control:
#   - rbac (Role-Based Access Control)
#   - abac (Attribute-Based Access Control)
#   - rls (Row-Level Security)
#   - mask (Masking / Tokenization)
#   - encrypt_at_rest / encrypt_in_transit
# domain_example: コールセンター / 物流 / データ分析基盤
# ============================================================

# ============================================================
# 分類別の取扱基準 (ベースライン)
# ============================================================

handling_baseline:
  public:
    encryption_at_rest: optional
    encryption_in_transit: required
    access_control: "公開"
    audit_log_retention: "30日"
    storage_region: "制限なし"
    media_handling: "ダウンロード可・印刷可"
    incident_response_priority: "P4"

  internal:
    encryption_at_rest: required
    encryption_in_transit: required
    access_control: "RBAC (社員)"
    audit_log_retention: "1年"
    storage_region: "国内優先 / 海外可"
    media_handling: "社内限定。社外送信時は要確認"
    incident_response_priority: "P3"

  confidential:
    encryption_at_rest: "required (AES-256)"
    encryption_in_transit: "required (TLS1.2+)"
    access_control: "RBAC + RLS + MFA"
    audit_log_retention: "3年"
    storage_region: "国内のみ (Japan East/West)"
    media_handling: "印刷不可・USB禁止・画面キャプチャ監視"
    incident_response_priority: "P2"

  restricted:
    encryption_at_rest: "required (AES-256, KMS-CMK)"
    encryption_in_transit: "required (TLS1.3 / mTLS)"
    access_control: "RBAC + RLS + MFA + Just-In-Time + 上長承認"
    audit_log_retention: "7年"
    storage_region: "国内のみ + 越境禁止"
    media_handling: "原則アクセス不可。出力時は鍵付PDF + 透かし"
    incident_response_priority: "P1 (24h以内に CISO 報告)"

# ============================================================
# データ資産一覧
# ============================================================

data_assets:
  # ------------------------------------------------------------
  # 例1: コールセンター - 通話録音
  # ------------------------------------------------------------
  - id: DATA-001
    name: "顧客通話録音 (音声+書き起こし)"
    domain_example: "コールセンター"
    data_type: "音声バイナリ + テキスト"
    classification: restricted
    rationale: "個人情報 + 通信の秘密 (電気通信事業法 第4条)"
    pii_register_id: PII-001
    storage:
      primary: "Azure Blob (Japan East) / GRS"
      replica: "Azure Blob (Japan West)"
      backup: "Azure Backup Vault (Japan East / 90日)"
    encryption:
      at_rest: "AES-256 + Azure Key Vault Customer-Managed Key"
      in_transit: "TLS 1.3 + mTLS for ingestion"
    access_control:
      - "RBAC: 'CSAuditRole' のみ Read 権限"
      - "RLS: 自部門の通話のみ"
      - "MFA: 全アクセスで Entra ID + 物理鍵"
      - "JIT: マネジャー承認 + 4時間有効期限"
    data_owner: "[CS統括部長]"
    data_steward: "[CS課マネジャー]"
    retention_period: "5年 (社内規定)"
    deletion_method: "Crypto-shredding (鍵破棄) + 物理削除確認"
    audit_trail: "Azure Monitor → Log Analytics (7年保管)"

  # ------------------------------------------------------------
  # 例2: 物流 - 配送先情報
  # ------------------------------------------------------------
  - id: DATA-002
    name: "配送先住所・氏名・連絡先"
    domain_example: "物流業"
    data_type: "リレーショナル (Azure SQL)"
    classification: confidential
    rationale: "個人情報 (基本)"
    pii_register_id: PII-002
    storage:
      primary: "Azure SQL DB (Japan East)"
      replica: "Read replica (Japan West)"
      backup: "PITR 35日 + 月次フル"
    encryption:
      at_rest: "TDE (AES-256)"
      in_transit: "TLS 1.2"
    access_control:
      - "RBAC: '配送オペレーション' ロール"
      - "PII マスキング: 営業/分析用途では氏名・電話の一部マスク"
    data_owner: "[配送統括部長]"
    data_steward: "[配送オペレーションリード]"
    retention_period: "配送完了から 3 年"
    deletion_method: "論理削除 → 30日 → 物理削除"
    audit_trail: "Azure Monitor (3年)"

  # ------------------------------------------------------------
  # 例3: データ分析 - Bronze層 生ログ
  # ------------------------------------------------------------
  - id: DATA-003
    name: "Bronze層 生ログ (POSトランザクション)"
    domain_example: "データ分析基盤"
    data_type: "Delta Lake / Parquet"
    classification: confidential
    rationale: "業務データ。PIIなし (会員IDのみ仮名化前)"
    pii_register_id: ""
    storage:
      primary: "Azure Databricks (Japan East) / ADLS Gen2"
      replica: ""
      backup: "Time Travel + Vacuum 保護"
    encryption:
      at_rest: "AES-256 (Databricks managed)"
      in_transit: "TLS 1.2"
    access_control:
      - "Unity Catalog テーブル権限"
      - "ETL サービスアカウント以外 read 不可"
    data_owner: "[データ統括部長]"
    data_steward: "[データエンジニアリード]"
    retention_period: "7年"
    deletion_method: "Vacuum + Manifest更新"
    audit_trail: "Unity Catalog Audit log (3年)"

  # ------------------------------------------------------------
  # 例4: データ分析 - Gold層 集計値
  # ------------------------------------------------------------
  - id: DATA-004
    name: "Gold層 KPI 集計データ"
    domain_example: "データ分析基盤"
    data_type: "Delta テーブル / BI 接続"
    classification: internal
    rationale: "集計値のため個人特定不能。社内分析用途"
    pii_register_id: ""
    storage:
      primary: "Azure Databricks Gold層"
      replica: ""
      backup: ""
    encryption:
      at_rest: "AES-256"
      in_transit: "TLS 1.2"
    access_control:
      - "Unity Catalog: BIユーザロール"
      - "SSO (Entra ID)"
    data_owner: "[マーケ部長]"
    data_steward: "[BIリード]"
    retention_period: "10年"
    deletion_method: "通常削除"
    audit_trail: "Unity Catalog (1年)"

  # ------------------------------------------------------------
  # 例5: 公開データ - サービス障害情報
  # ------------------------------------------------------------
  - id: DATA-005
    name: "サービス障害情報 (公式サイト掲載)"
    domain_example: "全社"
    data_type: "Markdown / Web"
    classification: public
    rationale: "顧客向け公開情報"
    pii_register_id: ""
    storage:
      primary: "Static Web Apps (CDN)"
      replica: ""
      backup: "Git リポジトリ"
    encryption:
      at_rest: "optional"
      in_transit: "TLS 1.2 (HTTPS)"
    access_control:
      - "公開"
    data_owner: "[広報部長]"
    data_steward: "[Web運用担当]"
    retention_period: "永続"
    deletion_method: "通常削除"
    audit_trail: "CDN ログ (90日)"

  # ------------------------------------------------------------
  # テンプレート: 新規追加時はこれをコピー
  # ------------------------------------------------------------
  - id: DATA-NNN
    name: "[埋めてください]"
    domain_example: "[コールセンター / 物流 / データ分析 等]"
    data_type: "[リレーショナル / オブジェクト / メッセージ 等]"
    classification: "[public | internal | confidential | restricted]"
    rationale: "[分類根拠]"
    pii_register_id: "[該当する場合 PII-NNN]"
    storage:
      primary: "[クラウドサービス + リージョン]"
      replica: ""
      backup: ""
    encryption:
      at_rest: "[暗号化方式]"
      in_transit: "[暗号化方式]"
    access_control:
      - "[アクセス制御方式 1]"
      - "[アクセス制御方式 2]"
    data_owner: "[役職 + 氏名]"
    data_steward: "[実務担当者]"
    retention_period: "[保管期間 + 根拠]"
    deletion_method: "[削除手順]"
    audit_trail: "[ログ保管先 + 保管期間]"

# ============================================================
