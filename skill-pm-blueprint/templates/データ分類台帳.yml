# ============================================================
# pm-blueprint 連携
# ============================================================
# 出力レイヤー: Layer 4 (Security/Privacy) / Layer 6 (Governance)
# 関連品質ゲート ID:
#   - LEGAL-DATACLASS-001 (High) ... 本台帳の存在
#   - LEGAL-PII-001 (Critical) ... PII取扱台帳との突合
# ゲート通過条件:
#   1. 全データ資産が classification を持つ
#   2. 機密/極秘データのオーナー・暗号化方式が明記
#   3. 直近 12 ヶ月以内に棚卸履歴がある
# ============================================================
