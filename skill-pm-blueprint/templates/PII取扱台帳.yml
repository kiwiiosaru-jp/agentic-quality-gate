review_history:
  - date: "[YYYY-MM-DD]"
    reviewer: "[CPO/DPO 氏名]"
    changes: "初版作成 / 全 PII 項目登録"
    findings: "[棚卸で見つかった是正点]"
  - date: "[次回棚卸予定]"
    reviewer: ""
    changes: ""
    findings: ""

# ============================================================
# pm-blueprint 連携
# ============================================================
# 出力レイヤー: Layer 4 (非機能要件: Privacy/Compliance) / Layer 6 (ガバナンス)
# 関連品質ゲート ID:
#   - LEGAL-PII-001 (Critical) ... 個人情報取扱台帳の存在性
#   - COMPLY-PIPA-JP-001 (Critical) ... 個情法対応マトリクスとの整合
#   - LEGAL-DATACLASS-001 (High) ... データ分類台帳との突合
# ゲート通過条件:
#   1. 全 PII 項目が登録されていること
#   2. 各項目に法務承認 (approved) が紐付いていること
#   3. 直近 6 ヶ月以内に棚卸履歴があること
# ============================================================
