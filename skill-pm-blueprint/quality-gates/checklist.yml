# pm-blueprint 品質ゲート チェックリスト
# agentic-quality-gate v4 の 49 評価エントリ (P0/P1/cross-cutting × critical/high) を YAML 形式で定義
# 各エントリは pm-blueprint Layer/サブスキルと紐付け

metadata:
  version: "4.0-pm-blueprint-2026-04-30"
  total_entries: 49
  source: "agentic-quality-gate plugin の品質評価ナレッジ（v4）"

# ====================================================================
# P0 Critical (10件中 critical 3件 + high 7件)
# ====================================================================

p0_critical:
  - id: LEGAL-INDUSTRY-001
    severity: critical
    gate: legal/industry
    観点: 業法該当性 (運送業/電気通信事業法/個情法/下請法等) の専門家承認
    ok基準: 業法判定書 + 専門家署名
    ng基準: 判定書ファイル不在 / 専門家承認なし
    applies_when: 全案件
    cited_layer: layer-7-legal-compliance/業法該当性判定書.md

  - id: LEGAL-PII-001
    severity: critical
    gate: legal/privacy
    観点: 個人情報取扱台帳 (項目/取得元/目的/保管期間/第三者提供/越境/法務承認)
    ok基準: 台帳ファイル存在 + 法務+DPO承認
    ng基準: 台帳ファイル不在
    applies_when: PII取扱あり
    cited_layer: layer-7-legal-compliance/個人情報取扱台帳.md

  - id: LEGAL-TOS-001
    severity: critical
    gate: legal/data
    観点: 外部データ取得元の利用規約適法性
    applies_when: 外部データ利用時
    cited_layer: layer-7-legal-compliance/

p0_high:
  - id: COST-ESTIMATE-001
    severity: high
    gate: cost/estimation
    観点: クラウド/LLM/データの概算コスト試算 + ハードリミット
    cited_layer: layer-1-executive/意思決定テンプレート.md

  - id: COST-UNIT-001
    severity: high
    gate: cost/unit
    観点: 課金単位 (req/token/storage/transfer) 単価表
    cited_layer: layer-1-executive/意思決定テンプレート.md

  - id: LEGAL-AIGEN-001
    severity: high
    gate: legal/copyright
    観点: AI生成物の著作権/学習利用/侵害可能性 (法務承認)
    applies_when: AI生成あり
    cited_layer: layer-7-legal-compliance/AI生成物著作権ポリシー.md

  - id: LEGAL-CROSSBORDER-001
    severity: high
    gate: legal/crossborder
    観点: 越境データ移転 (DPO承認)
    cited_layer: layer-7-legal-compliance/越境データ移転書.md

  - id: LEGAL-DATACLASS-001
    severity: high
    gate: data/classification
    観点: データ分類台帳 (公開/内部/機密/極秘) + データオーナー承認
    cited_layer: layer-7-legal-compliance/データ分類台帳.md

  - id: LEGAL-LICENSE-001
    severity: high
    gate: legal/license
    観点: OSSライセンス (GPL/AGPL汚染、商用可否)
    cited_layer: layer-7-legal-compliance/OSSライセンス管理.md

  - id: LEGAL-THREATMODEL-001
    severity: high
    gate: security/threatmodel
    観点: STRIDE/LINDDUN による脅威モデル v0
    cited_layer:
      - layer-5-risk/脅威モデリング.md
      - layer-5-risk/LINDDUNプライバシー脅威.md

  - id: STRATEGY-LIFETIME-001
    severity: high
    gate: strategy/lifetime
    観点: 想定寿命/品質投資/昇格判断基準
    cited_layer: layer-1-executive/意思決定テンプレート.md

# ====================================================================
# P1 Critical/High (24件: critical 7件 + high 17件)
# ====================================================================

p1_critical:
  - id: API-IDEMPOTENCY-001
    severity: critical
    gate: api/idempotency
    観点: 課金/書込APIへのIdempotency-Keyヘッダ仕様 + OpenAPI定義
    cited_layer: layer-3-architecture/API設計.md

  - id: ARCH-LAYER-001
    severity: critical
    gate: architecture/layer
    観点: IaaS/PaaS/SaaSレイヤ選定ADR + ARB承認
    cited_layer:
      - layer-3-architecture/アーキスタイル選定.md
      - layer-3-architecture/ADR作成.md

  - id: DATA-ENTITY-001
    severity: critical
    gate: data/modeling
    観点: ERD/エンティティ・関係性図 (多対多含む)
    cited_layer: layer-3-architecture/データ設計詳細.md

  - id: DATA-TX-001
    severity: critical
    gate: data/transaction
    観点: Tx境界宣言 (範囲/分離レベル/補償処理/タイムアウト)
    cited_layer: layer-3-architecture/データ設計詳細.md

  - id: ENV-SEPARATE-001
    severity: critical
    gate: env/separation
    観点: dev/stg/prod環境分離 (DB含む) + IaC + ドリフト検知CI
    cited_layer: layer-3-architecture/環境分離_IaC.md

  - id: SEC-AUTHZ-DESIGN-001
    severity: critical
    gate: security/authz
    観点: 認可方式 (RBAC/ABAC/ReBAC/OPA) 選定文書 + ポリシー定義 + テスト戦略
    cited_layer: layer-5-risk/認可方式選定.md

  - id: SEC-TENANT-001
    severity: critical
    gate: security/tenant
    観点: マルチテナント分離 (DB/schema/RLS)
    applies_when: SaaS/B2B
    cited_layer: layer-3-architecture/データ設計詳細.md

